name: Trigger site build

on:
  push:
    branches: [main]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger engine repo build
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ENGINE_DISPATCH_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: '${{ vars.ENGINE_OWNER }}',
              repo:  '${{ vars.ENGINE_REPO }}',
              event_type: 'content-updated',
              client_payload: {
                content_sha: context.sha,
                content_ref: context.ref,
              },
            });
